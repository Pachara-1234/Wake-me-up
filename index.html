<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>I-Oun Alarm Control</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #1a1a1a; color: white; }
        input { padding: 10px; font-size: 18px; border-radius: 5px; border: none; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 10px; display: none; margin-top: 20px; }
        button:hover { background: #c0392b; }
        #status { margin-top: 20px; color: #2ecc71; }
    </style>
</head>
<body>
    <h1>ระบบปลุกไออุ่น</h1>
    <div id="login-section">
        <p>กรุณาใส่รหัสผ่าน:</p>
        <input type="password" id="password" oninput="checkPass()" placeholder="******">
    </div>

    <button id="wakeBtn" onclick="sendWakeCommand()">WAKE I-OUN UP!</button>
    <p id="status"></p>

    <script>
        // เปลี่ยนเป็น IP ของ Pico 2W ที่แสดงใน Thonny
        const PICO_IP = "192.168.1.118"; 

        function checkPass() {
            const pass = document.getElementById('password').value;
            if (pass === "130825") {
                document.getElementById('wakeBtn').style.display = "inline-block";
                document.getElementById('login-section').style.display = "none";
            }
        }

        function sendWakeCommand() {
            document.getElementById('status').innerText = "กำลังส่งคำสั่ง...";
            fetch(`http://${PICO_IP}/wake`)
                .then(response => {
                    document.getElementById('status').innerText = "ปลุกไออุ่นสำเร็จ!";
                })
                .catch(err => {
                    document.getElementById('status').innerText = "เชื่อมต่อ Pico ไม่ได้ (เช็ค IP หรือ WiFi)";
                });
        }
    </script>
</body>
</html>
