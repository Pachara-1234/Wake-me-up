<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wake Me Up 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&family=Sarabun:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0c0e;
            --card-color: #1c1c1e;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --accent-blue: #0A84FF;
            --accent-red: #ff453a;
            --font-family: 'Inter', 'Sarabun', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Login Screen --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: all 0.5s ease;
        }
        .pin-input {
            background: #1c1c1e; border: 1px solid #333; border-radius: 15px;
            color: var(--text-main); font-size: 32px; text-align: center; width: 220px;
            padding: 15px; letter-spacing: 8px; outline: none;
        }

        /* --- Main App UI --- */
        #main-app { display: none; flex-direction: column; height: 100%; opacity: 0; }

        /* --- Tab Bar (Custom Borders) --- */
        .tab-bar {
            display: flex; justify-content: center; gap: 15px;
            padding: 30px 20px 10px; background-color: var(--bg-color);
        }
        .tab-btn {
            background: none; border: 1.5px solid #333; color: var(--text-muted); 
            font-size: 16px; font-weight: 600; padding: 12px 30px; cursor: pointer; 
            border-radius: 12px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab-btn.active {
            color: var(--accent-blue); border-color: var(--accent-blue);
            background: rgba(10, 132, 255, 0.1);
        }

        /* --- Content Area --- */
        .content-area { flex: 1; position: relative; overflow: hidden; }
        .tab-content {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 20px; display: flex; flex-direction: column; align-items: center;
            transition: transform 0.4s ease, opacity 0.4s;
        }

        /* --- WAKE UP Tab (Petting Cat) --- */
        .cat-container {
            position: relative; width: 250px; height: 250px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; margin-top: 40px;
        }
        .cat-img { width: 180px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.1)); }
        .hand-img {
            position: absolute; width: 100px; top: 40px; right: 20px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .cat-container:active .hand-img { transform: scale(1.4) translateY(15px) rotate(-10deg); }
        .awake-label { margin-top: 25px; font-size: 18px; font-weight: 300; color: var(--text-muted); }

        /* --- Timeset Tab (Alarm List) --- */
        .add-alarm-btn {
            background: var(--accent-blue); border: none; color: white;
            width: 60px; height: 60px; border-radius: 50%; font-size: 30px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 20px rgba(10, 132, 255, 0.3);
            cursor: pointer; margin-bottom: 30px;
        }
        .alarm-list {
            width: 100%; max-width: 450px; overflow-y: auto; 
            padding: 10px; display: flex; flex-direction: column; gap: 15px;
            max-height: 70vh; scrollbar-width: none;
        }
        .alarm-card {
            background: var(--card-color); border-radius: 24px; padding: 20px 25px;
            display: flex; justify-content: space-between; align-items: center;
            animation: slideUp 0.4s ease;
        }
        .alarm-info .time { font-size: 38px; font-weight: 300; letter-spacing: -1px; }
        .alarm-info .label { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

        /* --- Toggle Switch --- */
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #3a3a3c; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(22px); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Transitions */
        #nudge-tab { transform: translateX(0); }
        #alarm-tab { transform: translateX(100%); opacity: 0; }
        body.show-alarm #nudge-tab { transform: translateX(-100%); opacity: 0; }
        body.show-alarm #alarm-tab { transform: translateX(0); opacity: 1; }

        .status-text { margin-top: 30px; font-size: 13px; color: #555; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="margin-bottom: 20px; font-weight: 500;">Enter PIN</div>
        <input type="password" id="pin-input" class="pin-input" inputmode="numeric" maxlength="6" onkeyup="checkPin(this.value)">
        <div id="error-msg" style="color: var(--accent-red); margin-top: 15px; opacity: 0;">Incorrect PIN</div>
    </div>

    <div id="main-app">
        <div class="tab-bar">
            <button class="tab-btn active" id="btn-nudge" onclick="switchTab('nudge')">WAKE UP</button>
            <button class="tab-btn" id="btn-alarm" onclick="switchTab('alarm')">Timeset</button>
        </div>

        <div class="content-area">
            <div id="nudge-tab" class="tab-content">
                <div class="cat-container" onclick="handleNudge()">
                    <div class="cat-img" style="font-size: 120px;">🐱</div>
                    <div class="hand-img" style="font-size: 70px;">🫳</div>
                </div>
                <div class="awake-label">Awake ioun now buttom</div>
                <div id="nudge-status" class="status-text">Ready to nudge...</div>
            </div>

            <div id="alarm-tab" class="tab-content">
                <button class="add-alarm-btn" onclick="addNewAlarm()">+</button>
                <div class="alarm-list" id="alarm-list">
                    </div>
                <div id="alarm-status" class="status-text">Configure your wake up calls</div>
            </div>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://wake-me-up-kreme-default-rtdb.asia-southeast1.firebasedatabase.app/status.json";

        function checkPin(val) {
            if (val === "130825") {
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'flex';
                    setTimeout(() => document.getElementById('main-app').style.opacity = '1', 50);
                }, 500);
            }
        }

        function switchTab(tab) {
            if (tab === 'alarm') {
                document.body.classList.add('show-alarm');
                document.getElementById('btn-alarm').classList.add('active');
                document.getElementById('btn-nudge').classList.remove('active');
            } else {
                document.body.classList.remove('show-alarm');
                document.getElementById('btn-nudge').classList.add('active');
                document.getElementById('btn-alarm').classList.remove('active');
            }
        }

        async function handleNudge() {
            const status = document.getElementById('nudge-status');
            status.textContent = "Sending love...";
            await sendToFirebase('nudge');
            status.textContent = "Awoken successfully! 💖";
            setTimeout(() => status.textContent = "Ready to nudge...", 2000);
        }

        async function sendToFirebase(actionType, extra = {}) {
            const payload = { command: actionType, timestamp: Date.now(), ...extra };
            try {
                await fetch(FIREBASE_URL, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (e) { console.error(e); }
        }

        // --- Alarm List Logic ---
        function addNewAlarm() {
            const time = prompt("ใส่เวลาปลุก (เช่น 07:30)", "07:00");
            if (time && time.includes(":")) {
                createAlarmCard(time);
            }
        }

        function createAlarmCard(time) {
            const container = document.getElementById('alarm-list');
            const id = 'alarm-' + Date.now();
            
            const card = document.createElement('div');
            card.className = 'alarm-card';
            card.id = id;
            card.innerHTML = `
                <div class="alarm-info">
                    <div class="time">${time}</div>
                    <div class="label">Daily Alarm</div>
                </div>
                <label class="switch">
                    <input type="checkbox" checked onchange="toggleAlarmStatus('${time}', this.checked)">
                    <span class="slider"></span>
                </label>
            `;
            container.prepend(card);
            sendToFirebase('set_alarm', { alarm_time: time, is_active: true });
        }

        function toggleAlarmStatus(time, isActive) {
            sendToFirebase('set_alarm', { alarm_time: time, is_active: isActive });
        }
    </script>
</body>
</html>
