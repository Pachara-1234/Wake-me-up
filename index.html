<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sans Alarm</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin-top: 50px; }
        .box { border: 2px solid #fff; padding: 30px; display: inline-block; border-radius: 15px; }
        input { font-size: 20px; padding: 10px; border-radius: 5px; text-align: center; }
        button { background: #2980b9; color: #fff; border: none; padding: 15px 30px; font-size: 20px; border-radius: 10px; display: none; margin-top: 20px; cursor: pointer; }
        #cat { position: fixed; bottom: 10px; left: 10px; cursor: pointer; opacity: 0.2; font-size: 24px; background: none; border: none; }
        #cat:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="box">
        <h1>SANS ALARM</h1>
        <div id="login">
            <input type="password" id="pw" placeholder="PASSCODE" oninput="check()">
        </div>
        <button id="btn" onclick="hit('wake')">WAKE I-OUN UP!</button>
        <p id="msg">กรุณาใส่รหัสผ่าน</p>
    </div>
    <button id="cat" onclick="hit('stop')">🐈</button>

    <script>
        const PICO_IP = "192.168.1.XXX"; // แก้เป็นเลขที่โชว์บนจอ OLED

        function check() {
            if (document.getElementById('pw').value === "130825") {
                document.getElementById('btn').style.display = "block";
                document.getElementById('login').style.display = "none";
                document.getElementById('msg').innerText = "ปลดล็อคสำเร็จ";
            }
        }

        function hit(act) {
            document.getElementById('msg').innerText = "กำลังส่งคำสั่ง...";
            // ใช้ Image Beacon เพื่อข้ามปัญหา HTTPS/CORS
            const img = new Image();
            img.src = `http://${PICO_IP}/${act}?t=${Date.now()}`;
            
            setTimeout(() => {
                document.getElementById('msg').innerText = "ดำเนินการสำเร็จ!";
            }, 1000);
        }
    </script>
</body>
</html>
